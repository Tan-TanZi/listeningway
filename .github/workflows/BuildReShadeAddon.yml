name: BuildListeningwayAddon

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up broken ReShade SDK
        run: |
          if (Test-Path "third_party/reshade") { Remove-Item -Recurse -Force "third_party/reshade" }
          if (Test-Path "third_party/reshaed") { Remove-Item -Recurse -Force "third_party/reshaed" }

      - name: Download ReShade SDK as ZIP
        run: |
          $url = "https://github.com/reshade/reshade/archive/refs/heads/main.zip"
          $zipPath = "$env:TEMP\reshade.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath "third_party" -Force
          # 重命名解压后的文件夹
          if (Test-Path "third_party/reshade-main") {
            Rename-Item -Path "third_party/reshade-main" -NewName "reshade" -Force
          }
          Write-Host "ReShade SDK downloaded successfully"

      - name: Install dependencies via vcpkg
        run: |
          if (Test-Path "tools/vcpkg/vcpkg.exe") {
            .\tools\vcpkg\vcpkg install --triplet x64-windows-static
          } else {
            .\prepare.bat
          }

      - name: Configure CMake (x64)
        run: |
          cmake -B build-x64 -DCMAKE_TOOLCHAIN_FILE=tools/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -A x64

      - name: Build x64 addon
        run: |
          cmake --build build-x64 --config Release --target listeningway

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $addon64 = Get-ChildItem -Path build-x64 -Recurse -Filter "*.addon" | Select-Object -First 1
          if ($addon64) {
            Copy-Item $addon64.FullName -Destination "dist/Listeningway-x64.addon" -Force
            Write-Host "Found addon64: $($addon64.FullName)"
          } else {
            Write-Host "Warning: No .addon file found"
          }
          if (Test-Path "src/Listeningway.fx") { Copy-Item "src/Listeningway.fx" -Destination "dist/" -Force }
          if (Test-Path "src/ListeningwayUniforms.fxh") { Copy-Item "src/ListeningwayUniforms.fxh" -Destination "dist/" -Force }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-Build
          path: dist/
