name: BuildReShadeAddon
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码（递归拉取子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 关键：拉取 vcpkg 等子模块依赖

      - name: 配置MSVC编译环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 安装依赖（运行prepare.bat下载ReShade SDK）
        run: |
          .\prepare.bat
        shell: cmd

      - name: 运行编译脚本生成插件
        run: |
          .\build.bat
        shell: cmd

      - name: 上传编译好的插件文件
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-插件
          path: |
            dist/*.addon64
            dist/*.addon
            dist/*.fx
            dist/*.fxh
