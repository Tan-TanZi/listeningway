name: BuildListeningwayAddon

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # 不自动拉取子模块，因为 prepare.bat 会处理依赖

      - name: Prepare environment (prepare.bat)
        run: .\prepare.bat
        shell: cmd

      - name: Build the addon (build.bat)
        run: .\build.bat
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-Build
          path: dist/
