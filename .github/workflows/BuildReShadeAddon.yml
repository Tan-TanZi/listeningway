name: BuildReShadeAddon
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置VS2022 MSVC + Windows 11 SDK 环境（和本地完全一致）
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          winsdk: 22621  # 锁定Windows 11 SDK，对齐本地VS2022
          toolset: 143    # VS2022 MSVC版本

      - name: 强制设置编译环境变量（C++17）
        run: |
          echo "CXXFLAGS=/std:c++17" >> %GITHUB_ENV%
          echo "CFLAGS=/std:c17" >> %GITHUB_ENV%
        shell: cmd

      - name: 运行prepare.bat下载全部依赖（含ImGui Docking）
        run: |
          .\prepare.bat
        shell: cmd

      - name: 运行build.bat编译（和本地编译逻辑完全一致）
        run: |
          .\build.bat
        shell: cmd

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-插件
          path: |
            dist/*.addon64
            dist/*.addon
            dist/*.fx
            dist/*.fxh
