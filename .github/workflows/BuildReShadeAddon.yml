name: BuildListeningwayAddon

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: false

      # 修正：使用全小写 reshade/reshade，并使用 fetch-depth
      - name: Checkout ReShade SDK
        uses: actions/checkout@v4
        with:
          repository: reshade/reshade
          path: third_party/reshade
          ref: main
          fetch-depth: 1

      - name: Prepare environment (prepare.bat)
        run: .\prepare.bat
        shell: cmd

      - name: Build addon (build.bat)
        run: .\build.bat
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-Build
          path: dist/
