name: BuildReShadeAddon
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码（不递归拉取子模块）
        uses: actions/checkout@v4
        # 移除 submodules: recursive，避开 vcpkg 子模块报错

      - name: 配置MSVC编译环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 运行prepare.bat自动下载vcpkg、ReShade SDK依赖
        run: |
          .\prepare.bat
        shell: cmd

      - name: 运行build.bat编译生成.addon64
        run: |
          .\build.bat
        shell: cmd

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: Listeningway-插件
          path: |
            dist/*.addon64
            dist/*.addon
            dist/*.fx
            dist/*.fxh
